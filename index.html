<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Digital - Redirect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }

        h1 {
            color: #1f2937;
            margin-bottom: 1rem;
            font-size: 2rem;
        }

        p {
            color: #6b7280;
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-direction: column;
        }

        a {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-admin {
            background-color: #3b82f6;
            color: white;
        }

        .btn-admin:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-mobile {
            background-color: #10b981;
            color: white;
        }

        .btn-mobile:hover {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .info {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #e5e7eb;
            color: #9ca3af;
            font-size: 0.9rem;
        }

        .loading {
            display: none;
            margin-top: 1rem;
        }

        .spinner {
            border: 3px solid #f3f4f6;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 Absensi Digital</h1>
        <p>Pilih platform yang ingin Anda akses</p>

        <div class="button-group">
            <a href="/admin" class="btn-admin" onclick="redirectAdmin(event)">
                📊 Admin Panel
            </a>
            <a href="/mobile" class="btn-mobile" onclick="redirectMobile(event)">
                📱 Aplikasi Mobile
            </a>
        </div>

        <div class="info">
            <p>Admin Panel: http://localhost:3000</p>
            <p>Mobile App: Expo Development</p>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 1rem;">Sedang membuka...</p>
        </div>
    </div>

    <script>
        function redirectAdmin(e) {
            e.preventDefault();
            document.getElementById('loading').style.display = 'block';
            // Redirect ke admin panel
            setTimeout(() => {
                window.location.href = 'http://localhost:3000';
            }, 500);
        }

        function redirectMobile(e) {
            e.preventDefault();
            document.getElementById('loading').style.display = 'block';
            // Redirect ke mobile app
            setTimeout(() => {
                window.location.href = 'http://localhost:8081';
            }, 500);
        }

        // Auto redirect ke admin panel setelah 3 detik
        setTimeout(() => {
            console.log('Redirecting to admin panel...');
            window.location.href = 'http://localhost:3000';
        }, 3000);
    </script>
</body>
</html>
